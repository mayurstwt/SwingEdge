name: High Frequency Strategy Run

on:
  schedule:
    # Every 5 minutes (GitHub limit)
    - cron: '*/5 4-10 * * 1-5'  # 9:30 AM – 3:30 PM IST
  workflow_dispatch:

jobs:
  run-strategy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Run strategy every 3 minutes (loop)
        run: |
          echo "Starting 3-min interval execution..."

          for i in 1 2; do
            echo "Run $i at $(date)"

            RESPONSE=$(curl -s -o /tmp/response.json -w "%{http_code}" \
              -X POST "${{ secrets.NETLIFY_APP_URL }}/api/run-strategy" \
              -H "Content-Type: application/json" \
              -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
              --max-time 60)

            echo "HTTP Status: $RESPONSE"
            cat /tmp/response.json

            if [ "$RESPONSE" != "200" ]; then
              echo "Run failed"
            fi

            echo "Sleeping 180 seconds..."
            sleep 180
          done